<html>
<head>
    <style>
        ::-webkit-scrollbar {
            display: none;
        }
        :root {
          --color-bg: #ffffff;
          --color-text: #2e2e2e;
          --color-heading: #1a1a1a;
          --color-link: #0066cc;
          --color-border: #dcdcdc;
          --color-quote: #6a737d;
          --color-code: #d14;
        }

        .dark {
          --color-bg: #2b2b2b;
          --color-text: #cccccc;
          --color-heading: #ffffff;
          --color-link: #409eff;
          --color-border: #444444;
          --color-quote: #999999;
          --color-code: #ffd580;
        }

        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
          font-size: 14px;
          line-height: 1.7;
          background-color: var(--color-bg);
          color: var(--color-text);
          margin: 0;
          padding: 16px;
        }

        h1, h2, h3, h4, h5, h6 {
          margin: 1.2em 0 0.6em;
          color: var(--color-heading);
          line-height: 1.4;
        }

        h1 { font-size: 1.8em; }
        h2 { font-size: 1.5em; }
        h3 { font-size: 1.3em; }
        h4 { font-size: 1.1em; }
        h5, h6 { font-size: 1em; }

        p {
          margin: 0.5em 0;
        }

        a {
          color: var(--color-link);
          text-decoration: none;
        }
        a:hover {
          text-decoration: underline;
        }

        ul, ol {
          padding-left: 2em;
          margin: 1em 0;
        }

        li {
          margin: 0.3em 0;
        }

        blockquote {
          margin: 1em 0;
          padding: 0.6em 1em;
          border-left: 4px solid var(--color-border);
          color: var(--color-quote);
          background-color: rgba(127, 127, 127, 0.05);
          font-style: italic;
        }

        pre {
          padding: 1em;
          overflow-x: auto;
          border-radius: 6px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px;
          line-height: 1.5;
          background-color: var(--inline-code-bg);
          max-width: 100%%;
        }

        code {
          font-family: 'JetBrains Mono', monospace;
          font-size: 13px;
          color: var(--color-code);
          padding: 2px 4px;
          border-radius: 4px;
          background-color: transparent;
        }

        pre > code {
          padding: 0;
          border-radius: 0;
          background: none;
          color: inherit;
        }

        table {
          table-layout: auto;
          max-width: 100%%;
          word-break: break-word;
          border-collapse: collapse;
          margin: 1em 0;
          font-size: 12px;
        }

        th, td {
          border: 1px solid var(--color-border);
          padding: 6px 10px;
          text-align: left;
        }

        th {
          background-color: rgba(0, 0, 0, 0.05);
          font-weight: bold;
        }

        hr {
          border: none;
          border-top: 1px solid var(--color-border);
          margin: 2em 0;
        }
    </style>
</head>
<body class="%s">

%s

<script>
    function setTheme(theme) {
      document.body.className = theme;
    }
</script>
</body>
</html>
